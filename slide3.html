<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward_ios"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      #form br {
        display: none;
      }
      .nav-buttons {
        transition: all 0.3s ease;
        transform: translateY(-2px);
      }
      .btn.btn-primary {
        transition: all 0.3s ease;
      }
      .btn.btn-primary:hover {
        transform: translateY(-2px);
      }
    </style>
    <title>Document</title>
  </head>
  <body class="flex flex-col min-h-screen">
    <div
      class="nav flex justify-between items-center w-full max-w-[1440px] mx-auto px-[120px] py-[10px] shrink-0 border-b border-slate-200"
    >
      <img
        src="https://res.cloudinary.com/dzwqiw0nl/image/upload/v1776246329/Upperlink_Logo_m2nmca.png"
        alt="upperlink-logo"
        class="w-[180px]"
      />
      <p
        id="nav-word"
        class="text-2xl font-normal leading-[140%] text-black tracking-normal text-left w-[185px] h-[42px] py-1 px-[10px] gap-[10px]"
      >
        Applicant
      </p>
    </div>

    <div
      class="container flex flex-col items-center justify-center w-full max-w-[1440px] mx-auto px-[120px] py-3 gap-2 flex-1 min-h-0"
    >
      <div class="question-block w-full max-w-[600px]">
        <p
          class="select text-base font-normal leading-[150%] text-[rgba(156,149,149,1)] mb-1"
        >
          Select the correct option from the following
        </p>
        <p
          class="prop text-2xl font-normal text-black"
          style="font-family: &quot;Inter&quot;, sans-serif"
        >
          Which CSS property is used to change the text color of an element?
        </p>
      </div>

      <div id="form" class="w-full max-w-[600px]">
        <form>
          <label
            class="flex items-center gap-3 py-[10px] text-base cursor-pointer"
          >
            <input type="radio" name="question" value="font-style" />
            font-style </label
          ><br />

          <label
            class="flex items-center gap-3 py-[10px] text-base cursor-pointer"
          >
            <input type="radio" name="question" value="color" />
            color </label
          ><br />

          <label
            class="flex items-center gap-3 py-[10px] text-base cursor-pointer"
          >
            <input
              type="radio"
              name="question"
              value="background-color-style"
            />
            background-color-style </label
          ><br />

          <label
            class="flex items-center gap-3 py-[10px] text-base cursor-pointer"
          >
            <input type="radio" name="question" value="text-align" />
            text-align
          </label>
        </form>
      </div>

      <div class="nav-buttons flex justify-between w-full max-w-[600px] mb-4">
        <button
          class="btn flex items-center gap-2 bg-[#3b5bdb] hover:bg-[#2f4cc4] text-white border-none rounded-lg px-5 py-[10px] text-[15px] font-medium cursor-pointer"
        >
          <span class="material-symbols-outlined">arrow_back_ios</span>
          Previous
        </button>

        <button
          class="btn flex items-center gap-2 bg-[#3b5bdb] hover:bg-[#2f4cc4] text-white border-none rounded-lg px-5 py-[10px] text-[15px] font-medium cursor-pointer"
        >
          Next <span class="material-symbols-outlined">arrow_forward_ios</span>
        </button>
      </div>

      <!-- Pagination -->
      <div class="pagination-wrapper w-full max-w-[600px] p-0">
        <div
          class="page-numbers flex flex-wrap gap-[6px]"
          id="pageNumbers"
        ></div>
      </div>

      <div class="submit-container flex justify-end w-full max-w-[600px] mt-0">
        <button
          type="submit"
          class="btn btn-primary flex justify-center items-center w-[200px] h-12 bg-[#3641e1] hover:bg-[#2a33b5] text-white border-none rounded-lg font-semibold text-lg cursor-pointer shadow-md"
          id="submit-btn"
        >
          Submit
        </button>
      </div>
    </div>

    <script>
      let currentPage = 1;
      const totalPages = 30;

      function renderPages() {
        const container = document.getElementById("pageNumbers");
        container.innerHTML = "";

        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.className =
            "page-btn w-9 h-9 border-none rounded-md text-sm cursor-pointer " +
            (i === currentPage
              ? "active bg-[#4361ee] text-white"
              : "bg-[#e8ecf7] hover:bg-[#c5cef0] text-black");
          btn.textContent = i;
          btn.onclick = () => {
            currentPage = i;
            renderPages();
          };
          container.appendChild(btn);
        }
      }

      function changePage(direction) {
        currentPage = Math.min(
          Math.max(1, currentPage + direction),
          totalPages,
        );
        renderPages();
      }

      renderPages();
    </script>
  </body>
</html>
