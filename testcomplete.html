<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://tinyurl.com/yjdesv7k">
    <title>Test Complete</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col">
    <!-- navbar -->
    <header class="bg-white border-b border-[rgba(203, 213, 225, 0.9804)]">
        <nav class="w-full max-w-[1300px] h-[60px] flex items-center justify-between px-6 md:px-10 lg:px-16 mx-auto">

            <div>
                <a href="index.html">
                    <img class="w-[150px] h-auto" src="https://tinyurl.com/yjdesv7k" alt="UPL Logo">
                </a>
            </div>

            <div>
                <span class="text-[rgba(0, 0, 0, 1)] font-medium text-[16px]">
                    Applicant
                </span>
            </div>
        </nav>
    </header>

    <!-- main body -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div id="success-card"
            class="bg-white rounded-3xl p-10 md:p-12 max-w-[420px] w-full text-center border border-[0.5px] border-[#A8A8A8] shadow-md">

            <!-- blue checkmark circle -->
            <div class="w-20 h-20 flex items-center justify-center mx-auto mb-6">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="30" stroke="#3641E1" stroke-width="2" fill="none" />
                    <path d="M20 32L28 40L44 24" stroke="#3641E1" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>

            <!-- heading -->
            <h1 class="text-[22px] md:text-[24px] font-bold text-[rgba(9, 11, 54, 1)] mb-4 tracking-tight">Form Complete!</h1>

            <!-- paragraph -->
            <div class="space-y-1 mb-8">
                <p class="text-[rgba(75, 76, 89, 1)] text-[14px] leading-relaxed">The form has been successfully submitted.
You have <strong>15 minutes to complete 30 questions</strong>.
Click the button below to start your test. 
All the best!</p>
               
              
            </div>

            <!-- button -->
            <button
                class="w-full bg-[#3641E1] hover:bg-[#2B35B8] text-white font-medium text-[14px] py-3 px-6 rounded-lg transition-colors duration-200"
                >
                 Start
            </button>
        </div>
    </main>

  
</body>

</html>
